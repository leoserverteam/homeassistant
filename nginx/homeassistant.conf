# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name home.leonet.site;

    return 301 https://$host$request_uri;
}

# Main HTTPS server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name home.leonet.site;

    include snippets/sslpath.conf;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 16M;

    # Логи (по желанию поменяй пути)
    access_log /var/log/nginx/homeassistant.access.log;
    error_log  /var/log/nginx/homeassistant.error.log;

    location / {
        proxy_pass http://127.0.0.1:8123;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Поддержка WebSocket (обязательно для Home Assistant UI)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }
}